name: Deploy via FTP

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
          coverage: none

      - name: Install Composer Dependencies
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: 🗂️ Allow built assets to be deployed (remove from .gitignore)
        run: |
          sed -i '/\/public\/build/d' .gitignore
          sed -i '/\/public\/hot/d' .gitignore

      - name: 🔑 Create production .env from GitHub Secrets
        run: |
          cat > .env << EOF
          APP_NAME="Ogechi Hospital"
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}

          CACHE_DRIVER=file
          SESSION_DRIVER=file
          QUEUE_CONNECTION=sync
          EOF
          sed -i 's/^[[:space:]]*//' .env

      - name: 🔧 Patch public/index.php for server folder structure
        run: |
          sed -i "s|__DIR__.'/../storage|__DIR__.'/../Ogechihms/storage|g" public/index.php
          sed -i "s|__DIR__.'/../vendor/autoload.php|__DIR__.'/../Ogechihms/vendor/autoload.php|g" public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php|__DIR__.'/../Ogechihms/bootstrap/app.php|g" public/index.php
          sed -i "s|\\\$app = require_once .*|&\n\n\$app->usePublicPath(__DIR__);|g" public/index.php

      - name: 📂 Deploy app files → /Ogechihms/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /Ogechihms/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/storage/logs/**
            **/README.md
            **/.editorconfig
            phpunit.xml
            .env.example
            .gitignore
            **/public/**

      - name: 🌐 Deploy public files → /public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
