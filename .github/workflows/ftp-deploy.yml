name: Deploy via FTP

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, pdo
          coverage: none

      - name: Install Composer Dependencies
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist --optimize-autoloader --no-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm ci

      - name: Build Frontend Assets
        run: npm run build

      - name: 🔧 Patch public/index.php for server folder structure
        run: |
          sed -i "s|__DIR__.'/../storage|__DIR__.'/../Ogechihms/storage|g" public/index.php
          sed -i "s|__DIR__.'/../vendor/autoload.php|__DIR__.'/../Ogechihms/vendor/autoload.php|g" public/index.php
          sed -i "s|__DIR__.'/../bootstrap/app.php|__DIR__.'/../Ogechihms/bootstrap/app.php|g" public/index.php

      - name: 📂 Deploy app files → /Ogechihms/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /Ogechihms/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/tests/**
            **/.env*
            **/storage/logs/**
            **/README.md
            **/.editorconfig
            phpunit.xml
            .env.example
            .gitignore
            **/public/**

      - name: 🌐 Deploy public files → /public_html/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
